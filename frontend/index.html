<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TEST_4G — Monitor TCP 9910</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg"></div>

  <header class="top">
    <div class="brand">
      <span class="brand-mark">TEST_4G</span>
      <span class="brand-sub">Monitor TCP · Puerto 9910</span>
    </div>
    <div class="status-row">
      <span id="wsDot" class="dot off" title="WebSocket"></span>
      <span id="wsLabel">WS…</span>
      <button type="button" id="btnSweep" class="btn ghost" title="Limpiar IPs huérfanas">Limpiar huérfanas</button>
    </div>
  </header>

  <main class="layout">
    <aside class="panel devices">
      <div class="panel-head">
        <h2>Dispositivos</h2>
        <span id="devCount" class="badge">0</span>
      </div>
      <ul id="deviceList" class="device-list"></ul>
      <p id="emptyDevices" class="empty">Ningún equipo conectado</p>
    </aside>

    <section class="panel monitor">
      <div class="panel-head">
        <h2 id="monitorTitle">Capturas RX / TX</h2>
        <div class="filters">
          <select id="filterDir" aria-label="Dirección">
            <option value="all">RX + TX</option>
            <option value="rx">Solo RX</option>
            <option value="tx">Solo TX</option>
          </select>
          <select id="filterType" aria-label="Tipo de valor">
            <option value="all">Todos los tipos</option>
            <option value="hex">HEX</option>
            <option value="string">String</option>
            <option value="int">Int</option>
            <option value="json">JSON</option>
          </select>
        </div>
        <button type="button" id="btnClear" class="btn ghost">Limpiar</button>
      </div>

      <div class="capture-wrap">
        <table class="capture-table" aria-label="Datos capturados">
          <thead>
            <tr>
              <th>Hora</th>
              <th>Dir</th>
              <th>Tipo</th>
              <th>Valor</th>
              <th>HEX</th>
              <th>Int</th>
              <th>Dispositivo</th>
            </tr>
          </thead>
          <tbody id="captureBody"></tbody>
        </table>
        <p id="emptyCaptures" class="empty show">Sin capturas aún. Conecta un equipo al puerto 9910.</p>
      </div>

      <form id="sendForm" class="send-bar">
        <select id="encoding" aria-label="Codificación">
          <option value="string">String</option>
          <option value="hex">Hexadecimal</option>
          <option value="int">Int</option>
        </select>
        <input id="message" type="text" placeholder="Mensaje… (string / hex / int)" autocomplete="off" />
        <label class="chk">
          <input type="checkbox" id="addCrLf" checked />
          +CRLF
        </label>
        <button type="submit" class="btn primary" id="btnSend">Enviar</button>
      </form>
      <p id="sendHint" class="hint">Selecciona un dispositivo para enviar.</p>
    </section>
  </main>

  <!-- Mismo origen vía nginx (/api, /ws). Override: <meta name="api-base" content="http://host:9081"> -->
  <script src="app.js"></script>
</body>
</html>
